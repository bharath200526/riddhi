<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Surprise for Riddhi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background-color: #e11d48; /* Crimson matching curtains for loading seamlessness */
        }
        .cursive { font-family: 'Dancing Script', cursive; }

        /* THE GATEKEEPER LAYER (CURTAINS) */
        #gatekeeper {
            position: fixed;
            inset: 0;
            display: flex;
            z-index: 9999; 
            transition: visibility 0s 2s;
        }

        .curtain {
            width: 50%;
            height: 100%;
            background-color: #e11d48; /* Crimson Red */
            position: relative;
            /* Fast "Snap" transition for ribbon cutting */
            transition: transform 1.2s cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* Message sitting above the ribbon */
        .gatekeeper-message {
            position: absolute;
            top: 32%; 
            left: 50%;
            transform: translateX(-50%);
            width: 100vw;
            text-align: center;
            z-index: 10001;
            pointer-events: none;
            transition: opacity 0.6s ease;
        }

        .ribbon-half {
            position: absolute;
            width: 100%;
            height: 60px;
            background: #fbbf24;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            border-top: 2px solid #d97706;
            border-bottom: 2px solid #d97706;
        }

        .bow-center {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 10000;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .bow-center:hover { 
            transform: translate(-50%, -50%) scale(1.15); 
        }

        /* OPENING STATE ANIMATIONS */
        .opened .left-curtain { 
            transform: translateX(-100%); 
        }
        
        .opened .right-curtain { 
            transform: translateX(100%); 
        }

        .opened .gatekeeper-message { 
            opacity: 0; 
        }

        .opened .bow-center { 
            opacity: 0; 
            transform: translate(-50%, -50%) scale(2); /* "Pop" effect */
            pointer-events: none; 
        }

        .opened { visibility: hidden; }

        /* THE REVEALED BACKGROUND (THE GARDEN) */
        main {
            height: 100vh;
            width: 100vw;
            /* Placeholder: Use a high-res image of a dahlia garden */
            background-image: url('https://images.unsplash.com/photo-1596700877148-1ff43e5a3f37?q=80&w=2000&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-col;
            items-center;
            justify-content: center;
            p-6;
            text-center;
            position: relative;
        }

        /* Adding an overlay over the garden to make the pink text readable */
        main::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.3); /* Subtle dark tint */
            z-index: 1;
        }

        /* Main Content Entrance (Text + Buttons) */
        .reveal-content {
            opacity: 0;
            transform: translateY(30px);
            transition: all 1s ease-out 1.5s; /* Delay so curtains open first */
            z-index: 10; /* Above the dark overlay */
        }
        
        .opened-content {
            opacity: 1 !important;
            transform: translateY(0) !important;
        }
    </style>
</head>
<body>

    <div id="gatekeeper">
        <div class="gatekeeper-message">
            <h2 class="cursive text-4xl md:text-5xl text-white drop-shadow-2xl">Hey Riddhi, this is for you...</h2>
        </div>

        <div class="curtain left-curtain">
            <div class="ribbon-half"></div>
        </div>
        
        <div class="bow-center" onclick="openSurprise()">
            <div class="bg-amber-400 w-24 h-24 rounded-full flex items-center justify-center shadow-2xl border-4 border-amber-600">
                <span class="text-white font-bold text-center text-sm leading-tight uppercase select-none">Cut<br>Ribbon</span>
            </div>
            <div class="absolute -left-6 top-4 w-12 h-16 bg-amber-500 rounded-full -rotate-45 -z-10"></div>
            <div class="absolute -right-6 top-4 w-12 h-16 bg-amber-500 rounded-full rotate-45 -z-10"></div>
        </div>

        <div class="curtain right-curtain">
            <div class="ribbon-half"></div>
        </div>
    </div>

    <main>
        <div id="main-text" class="reveal-content px-4 py-8 bg-white/70 rounded-3xl backdrop-blur-sm shadow-xl">
            <h1 class="cursive text-6xl md:text-8xl text-rose-700 mb-4">Hey Riddhi,</h1>
            <p class="text-2xl text-gray-800 italic mb-10">I'm so glad you're here.</p>

            <button onclick="revealBirthday()" id="bday-btn" class="bg-rose-500 text-white px-12 py-4 rounded-full font-bold shadow-lg hover:bg-rose-600 transition-all hover:scale-105 active:scale-95 animate-bounce">
                Touch Me ✨
            </button>

            <div id="bday-message" class="hidden mt-6">
                <h2 class="cursive text-5xl md:text-7xl text-rose-600 animate-pulse">Happy Birthday! 🎂</h2>
                <div class="mt-8 flex gap-6 justify-center">
                    <a href="memories.html" class="text-rose-400 font-semibold hover:text-rose-600 transition-colors underline decoration-dotted">Our Memories</a>
                    <a href="letter.html" class="text-rose-400 font-semibold hover:text-rose-600 transition-colors underline decoration-dotted">Read Letter</a>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>

    <script>
        function openSurprise() {
            // Trigger curtain animation
            document.getElementById('gatekeeper').classList.add('opened');
            
            // Show main content with delay
            document.getElementById('main-text').classList.add('opened-content');
            
            // Allow page interaction
            document.body.style.overflow = 'auto';
        }

        function revealBirthday() {
            // Swap button for message
            document.getElementById('bday-btn').classList.add('hidden');
            document.getElementById('bday-message').classList.remove('hidden');
            
            // Burst of celebration
            const duration = 3 * 1000;
            const end = Date.now() + duration;

            (function frame() {
                confetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: ['#e11d48', '#fbbf24', '#f43f5e']
                });
                confetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: ['#e11d48', '#fbbf24', '#f43f5e']
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }
    </script>
</body>
</html>
