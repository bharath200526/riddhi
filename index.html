<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Magic Surprise for Riddhi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        .handwritten { font-family: 'Dancing Script', cursive; }
        .velvet {
            background: linear-gradient(90deg, #7f1d1d 0%, #b91c1c 15%, #991b1b 30%, #b91c1c 45%, #7f1d1d 60%, #b91c1c 75%, #7f1d1d 100%);
            background-size: 50px 100%;
        }
        .curtain { transition: all 2.5s cubic-bezier(0.45, 0.05, 0.55, 0.95); z-index: 50; }
        .open-left { transform: translateX(-85%) skewY(5deg) scaleX(0.4); border-radius: 0 50% 50% 0; }
        .open-right { transform: translateX(85%) skewY(-5deg) scaleX(0.4); border-radius: 50% 0 0 50%; }
        .spotlight-overlay { background: radial-gradient(circle at 50% 50%, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.8) 100%); }
        .fade-in-text { animation: fadeInScale 2s forwards; opacity: 0; }
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-black overflow-hidden">
    <div class="fixed inset-0 z-0">
        <div class="absolute inset-0 bg-yellow-500/20 mix-blend-overlay"></div>
        <div class="absolute inset-0 spotlight-overlay"></div>
    </div>
    <div class="absolute inset-0 flex flex-col items-center justify-center text-center px-4 z-10">
        <h2 id="reveal-text" class="handwritten text-5xl md:text-8xl text-yellow-500 hidden drop-shadow-[0_10px_20px_rgba(0,0,0,0.9)]">Happy Birthday Riddhi</h2>
    </div>
    <div id="left" class="curtain velvet fixed top-0 left-0 w-1/2 h-full border-r border-yellow-600/30"></div>
    <div id="right" class="curtain velvet fixed top-0 right-0 w-1/2 h-full border-l border-yellow-600/30"></div>
    <div id="trigger" class="absolute inset-0 flex flex-col items-center justify-center z-[60]">
        <button onclick="revealMagic()" class="group relative px-14 py-6 font-bold text-white transition-all">
            <span class="absolute inset-0 w-full h-full bg-yellow-600 rounded-xl blur-md opacity-70"></span>
            <span class="relative bg-zinc-900 border-2 border-yellow-500 px-14 py-6 rounded-xl block text-xl tracking-widest">REVEAL THE MAGIC</span>
        </button>
    </div>
    <script>
        function revealMagic() {
            document.getElementById('left').classList.add('open-left');
            document.getElementById('right').classList.add('open-right');
            document.getElementById('trigger').style.opacity = '0';
            const text = document.getElementById('reveal-text');
            text.classList.remove('hidden');
            text.classList.add('fade-in-text');
            window.parent.postMessage("start_surprise", "*");
            setTimeout(() => { window.parent.postMessage("go_to_hub", "*"); }, 5000);
        }
    </script>
</body>
</html>
