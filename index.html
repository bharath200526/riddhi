<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Magic Surprise for Riddhi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        .handwritten { font-family: 'Dancing Script', cursive; }
        
        /* Magic Velvet Curtain Texture */
        .velvet {
            background: linear-gradient(90deg, #7f1d1d 0%, #b91c1c 15%, #991b1b 30%, #b91c1c 45%, #7f1d1d 60%, #b91c1c 75%, #7f1d1d 100%);
            background-size: 50px 100%;
        }

        /* Curtain Animation Logic */
        .curtain {
            transition: all 2.5s cubic-bezier(0.45, 0.05, 0.55, 0.95);
            z-index: 50;
        }

        .open-left { 
            transform: translateX(-85%) skewY(5deg) scaleX(0.4); 
            border-radius: 0 50% 50% 0;
        }

        .open-right { 
            transform: translateX(85%) skewY(-5deg) scaleX(0.4); 
            border-radius: 50% 0 0 50%;
        }

        /* Birthday Text Animation */
        .fade-in-text {
            animation: fadeInScale 2s forwards;
            opacity: 0;
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="bg-black overflow-hidden">

    <div class="absolute inset-0 flex flex-col items-center justify-center text-center px-4 z-10">
        <h2 id="reveal-text" class="handwritten text-5xl md:text-8xl text-yellow-500 hidden">
            Happy Birthday, Riddhi ❤️
        </h2>
    </div>

    <div id="left" class="curtain velvet fixed top-0 left-0 w-1/2 h-full border-r border-yellow-600/30 shadow-[10px_0_30px_rgba(0,0,0,0.5)]"></div>
    <div id="right" class="curtain velvet fixed top-0 right-0 w-1/2 h-full border-l border-yellow-600/30 shadow-[-10px_0_30px_rgba(0,0,0,0.5)]"></div>

    <div id="trigger" class="absolute inset-0 flex flex-col items-center justify-center z-[60] transition-opacity duration-700">
        <div class="text-center">
            <button onclick="revealMagic()" class="group relative px-14 py-6 font-bold text-white transition-all">
                <span class="absolute inset-0 w-full h-full bg-yellow-600 rounded-xl blur-md group-hover:blur-lg transition-all opacity-70"></span>
                <span class="relative bg-zinc-900 border-2 border-yellow-500 px-14 py-6 rounded-xl block text-xl tracking-widest group-hover:text-yellow-400 group-active:scale-95 transition-transform uppercase">
                    Reveal the Magic
                </span>
            </button>
            <p class="text-yellow-500/80 mt-6 tracking-[0.3em] text-xs uppercase font-bold animate-pulse">Touch to begin</p>
        </div>
    </div>

    <script>
        function revealMagic() {
            // 1. Open the curtains
            document.getElementById('left').classList.add('open-left');
            document.getElementById('right').classList.add('open-right');
            
            // 2. Hide the button
            const trigger = document.getElementById('trigger');
            trigger.style.opacity = '0';
            trigger.style.pointerEvents = 'none';

            // 3. Show the birthday name
            const text = document.getElementById('reveal-text');
            text.classList.remove('hidden');
            text.classList.add('fade-in-text');

            // 4. Tell main.html to start the music
            window.parent.postMessage("start_surprise", "*");

            // 5. Wait 5 seconds, then move to hub.html
            setTimeout(() => {
                window.parent.postMessage("go_to_hub", "*");
            }, 5000);
        }
    </script>

</body>
</html>
