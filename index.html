<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Riddhi ❤️</title>
    <style>
        /* Ensures the experience is full-screen and clean */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            background: #000; 
        }

        /* This is the window that will show main.html, hub.html, etc. */
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
            display: block;
        }

        /* Keeps the audio player hidden */
        #bgMusic { display: none; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="snap/song1.mp3" type="audio/mpeg">
    </audio>

    <iframe id="contentFrame" src="main.html"></iframe>

    <script>
        const audio = document.getElementById("bgMusic");
        const frame = document.getElementById("contentFrame");

        // This listens for signals sent from the pages inside the iframe
        window.addEventListener("message", function(event) {
            
            // 1. Starts music when "Reveal" is clicked in main.html
            if (event.data === "start_surprise") {
                audio.play().catch(e => console.log("Music play blocked until user interaction."));
            } 
            
            // 2. Changes the iframe content to the Hub menu
            else if (event.data === "go_to_hub") {
                frame.src = "hub.html";
            }

            // 3. Pauses background music (for Reels or Songs)
            else if (event.data === "pause_bg_music") {
                audio.pause();
            } 

            // 4. Resumes background music
            else if (event.data === "resume_bg_music") {
                audio.play();
            }
        });
    </script>
</body>
</html>
